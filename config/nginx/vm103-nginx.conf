
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 172.17.0.13 localhost;

    root /var/www/html;
    index index.html;

    # Rate limiting — necesario para que Fail2Ban nginx-req-limit dispare
    limit_req zone=req_limit_per_ip burst=20 nodelay;

    # Mismo log que monitoriza Fail2Ban — NO el log separado anterior
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Raiz del sitio
    location / {
        try_files $uri $uri/ =404;
    }

    # --- Rutas realistas para el demo ffuf ---

    location /admin {
        return 403;
    }

    location /login {
        default_type text/html;
        return 200 '<html><head><title>Supreme Hair Trends - Staff Portal</title></head>
        <body style="background:#8B0000;color:#FFD700;font-family:monospace;text-align:center;padding:50px">
        <h1>Staff Portal</h1>
        <form>
        <input type="text" placeholder="Username" style="display:block;margin:10px auto;padding:8px;width:200px"><br>
        <input type="password" placeholder="Password" style="display:block;margin:10px auto;padding:8px;width:200px"><br>
        <button style="background:#DC143C;color:#FFD700;padding:10px 30px;border:2px solid #FFD700;cursor:pointer">Login</button>
        </form></body></html>';
    }

    location /dashboard {
        return 302 /login;
    }

    location /panel {
        return 302 /login;
    }

    location /api {
        default_type application/json;
        return 200 '{"status":"ok","service":"supreme-hair-api","version":"2.1","auth":"required"}';
    }

    location /api/v1 {
        default_type application/json;
        return 200 '{"endpoints":["trends","products","users","orders"],"auth":"Bearer token required"}';
    }

    location /shop {
        default_type text/html;
        return 200 '<html><head><title>Supreme Hair Shop</title></head>
        <body style="background:#8B0000;color:#FFD700;font-family:monospace;text-align:center;padding:50px">
        <h1>Revolutionary Hair Products</h1><p>Shop temporarily closed for ideological restructuring.</p>
        </body></html>';
    }

    location /products {
        return 302 /shop;
    }

    location /blog {
        default_type text/html;
        return 200 '<html><head><title>Supreme Hair Blog</title></head>
        <body style="background:#8B0000;color:#FFD700;font-family:monospace;padding:30px">
        <h1>Latest Trends</h1><p>Post #1: The Peoples Pompadour reaches 14,202 admirers.</p>
        </body></html>';
    }

    location /contact {
        default_type text/html;
        return 200 '<html><head><title>Contact</title></head>
        <body style="background:#8B0000;color:#FFD700;font-family:monospace;text-align:center;padding:50px">
        <h1>Contact the Ministry of Hair</h1><p>ministry@supreme-hair-trends.local</p>
        </body></html>';
    }

    location /uploads {
        return 403;
    }

    location /backup {
        return 403;
    }

    location /config {
        return 403;
    }

    location /staff {
        return 403;
    }

    location /.env {
        return 403;
    }

    location /.git {
        return 403;
    }
}
