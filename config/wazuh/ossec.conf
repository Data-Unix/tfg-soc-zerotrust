
<!--
================================================================================
  ossec.conf — Wazuh Manager v4.14.1
  ENTORNO: server-siem-wazuh (172.18.0.12)
================================================================================

  HISTORIAL DE CAMBIOS RESPECTO A v6
  ====================================
  OPNsense v26.1.6_2 sí dispone del plugin os-wazuh-agent v4.14.3,
   capaz de leer eve.json en formato JSON puro y transmitirlo al manager mediante canal cifrado TCP/1514.

  PRINCIPIOS DE DISEÑO APLICADOS
  ================================
  · Zero Trust: todo tráfico entrante es potencialmente hostil hasta
    demostración contraria. La respuesta activa converge en un único
    punto de control: el alias wazuh_blocklist de OPNsense.
  · Segregación de funciones: detección (Suricata, Cowrie, Fail2Ban) está
    distribuida; decisión y bloqueo (Wazuh + OPNsense API) está centralizada.
  · Mínimo privilegio: el usuario API wazuh_api solo puede modificar aliases.
  · Multi-tenancy: tenant Global (admin_soc) ve todo; tenant cliente_demo
    (cliente_viewer) solo ve sus agentes asignados.
================================================================================
-->

<ossec_config>

  <!--
  ==============================================================================
    BLOQUE 1 — GLOBAL
  ==============================================================================
    jsonout_output: genera alerts.json (consumido por OpenSearch Indexer).
    alerts_log: genera alerts.log en texto plano (útil para debugging).
    logall/logall_json: desactivados para no saturar disco en laboratorio.
    email_notification: no hay SMTP real; las alertas se visualizan en dashboard.
    white_list: IPs que nunca generan alertas aunque sean origen de eventos.
    agents_disconnection_time: 15 minutos es razonable para VMs de laboratorio.
  ==============================================================================
  -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <smtp_server>smtp.example.wazuh.com</smtp_server>
    <email_from>wazuh@example.wazuh.com</email_from>
    <email_to>recipient@example.wazuh.com</email_to>
    <email_maxperhour>12</email_maxperhour>
    <email_log_source>alerts.log</email_log_source>
    <agents_disconnection_time>15m</agents_disconnection_time>
    <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
    <update_check>yes</update_check>
    <white_list>127.0.0.1</white_list>
    <white_list>^localhost.localdomain$</white_list>
    <white_list>127.0.0.53</white_list>
    <white_list>172.17.0.16</white_list>
    <white_list>172.17.0.13</white_list>
    <white_list>172.18.0.12</white_list>
    <white_list>172.18.0.1</white_list>
    <white_list>172.18.0.56</white_list>
    <white_list>172.18.0.20</white_list>
   
  </global>


  <!--
  ==============================================================================
    BLOQUE 2 — ALERTS
  ==============================================================================
    log_alert_level: nivel mínimo para indexar en OpenSearch.
      Nivel 3 = incluye informativos y baja prioridad.
      Si el dashboard tiene demasiado ruido, subir a 5.
    email_alert_level: 12 = solo notifica por correo eventos HIGH/CRITICAL.
      En este entorno no hay SMTP, pero el nivel sirve como referencia
      para el umbral de escalada en el SOC.
  ==============================================================================
  -->
  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>


  <!--
  ==============================================================================
    BLOQUE 3 — LOGGING
  ==============================================================================
    Formato del fichero /var/ossec/logs/ossec.log (log interno del manager).
    plain = texto legible para revisión directa en terminal.
    json = estructurado para parsers externos (no necesario en este TFG).
  ==============================================================================
  -->
  <logging>
    <log_format>plain</log_format>
  </logging>


  <!--
  ==============================================================================
    BLOQUE 4 — REMOTE (dos listeners independientes)
  ==============================================================================
    Wazuh v4.x soporta múltiples bloques <remote> con distintos puertos,
    protocolos y tipos de conexión. Cada uno se gestiona como un listener
    independiente en wazuh-remoted.

    4A — Agentes Wazuh (TCP/1514 cifrado)
    =====================================
    Todos los agentes del laboratorio se conectan aquí:
      · OPNsense.internal (ID 009) — Suricata EVE JSON
      · T-Pot (próximo ID) — Cowrie + Dionaea logs
      · Server-Fail2Ban (ID 008) — sshd + fail2ban logs
      · 3× VMs Cliente (próximos IDs) — servicios expuestos
    queue_size: 131072 proporciona buffer suficiente para picos de eventos
    durante escaneos masivos o ataques distribuidos.

    4B — Syslog OPNsense (UDP/514)
    ================================
    CORRECCIÓN RESPECTO A v6:
    El planning v6 asumía que este receptor recibiría los eve.json de
    Suricata envueltos en syslog. La realidad es que OPNsense dispone del
    plugin os-wazuh-agent, que lee /var/log/suricata/eve.json directamente
    y lo transmite por el canal seguro 4A (TCP/1514).

    Por tanto, el receptor syslog 514 se reorienta exclusivamente a:
      · filterlog: logs del firewall pf (bloqueos, pases, NAT).
      · system logs: eventos del sistema OPNsense (boot, servicios).
    Esto proporciona visibilidad de las decisiones del firewall perimetral
    que complementa las alertas de Suricata (detección basada en firmas).

    allowed-ips: restringido a 172.18.0.0/24 (red de gestión) para evitar
    que cualquier host envíe syslog spoofeado al manager.
  ==============================================================================
  -->

  <!-- 4A — Agentes Wazuh (canal seguro) -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <!-- 4B — Syslog OPNsense (filterlog + system) -->
  <remote>
    <connection>syslog</connection>
    <port>514</port>
    <protocol>udp</protocol>
    <allowed-ips>172.18.0.0/24</allowed-ips>
  </remote>


  <!--
  ==============================================================================
    BLOQUE 5 — AUTH
  ==============================================================================
    Puerto de enrollment de agentes (1515 TCP).
    Cuando se instala wazuh-agent con WAZUH_MANAGER='IP', el agente
    se conecta aquí para recibir su clave y completar el registro.
    use_password:no permite registro sin contraseña adicional (aceptable
    para un laboratorio controlado detrás de firewall perimetral).
  ==============================================================================
  -->
  <auth>
    <disabled>no</disabled>
    <port>1515</port>
    <use_source_ip>no</use_source_ip>
    <purge>yes</purge>
    <use_password>no</use_password>
    <ssl_verify_host>no</ssl_verify_host>
    <ssl_manager_cert>etc/sslmanager.cert</ssl_manager_cert>
    <ssl_manager_key>etc/sslmanager.key</ssl_manager_key>
  </auth>


  <!--
  ==============================================================================
    BLOQUE 6 — RULESET
  ==============================================================================
    ORDEN DE CARGA (importante):
      1. ruleset/decoders  → decoders built-in del sistema
      2. etc/decoders      → decoders custom (tpot_decoders.xml,
                              opnsense_filterlog_decoder.xml)
      3. ruleset/rules     → reglas built-in (IDs 0–89999)
      4. etc/rules         → reglas custom (local_rules.xml)

    rule_exclude:
      · 0215-policy_rules.xml: excluido en v6 por generar ruido.
      · 0800-amazon_rules.xml: AÑADIDO en v7. Referencia listas AWS
        (aws-eventnames) que no existen en este entorno, generando
        warnings 7616/7617/7619/7620 en cada reinicio del manager.

    Listas malicious-ioc:
      Las tres entradas resuelven los WARNING (7616) de
      0999-malicious-ioc-rules.xml. Las listas pueden estar vacías;
      Wazuh las carga sin error y las reglas 99901–99920 quedan
      activas pero sin contenido que matchear.
      PREREQUISITO: los ficheros deben existir en disco:
        /var/ossec/etc/lists/malicious-ioc/malicious-ip
        /var/ossec/etc/lists/malicious-ioc/malicious-domains
        /var/ossec/etc/lists/malicious-ioc/malware-hashes
  ==============================================================================
  -->
  <ruleset>
    <!-- Built-in del sistema — NO modificar -->
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>

    <!-- Custom del proyecto -->
    <decoder_dir>etc/decoders</decoder_dir>
    <rule_dir>etc/rules</rule_dir>

    <!-- Exclusiones para evitar warnings y ruido -->
    <rule_exclude>0215-policy_rules.xml</rule_exclude>
    <rule_exclude>0350-amazon_rules.xml</rule_exclude>
    <rule_exclude>0800-amazon_rules.xml</rule_exclude>

    <!-- Listas siempre presentes -->
    <list>etc/lists/audit-keys</list>
    <list>etc/lists/security-eventchannel</list>

    <!-- Listas malicious-ioc (pueden estar vacías) -->
    <list>etc/lists/malicious-ioc/malicious-ip</list>
    <list>etc/lists/malicious-ioc/malicious-domains</list>
    <list>etc/lists/malicious-ioc/malware-hashes</list>
  </ruleset>


  <!--
  ==============================================================================
    BLOQUE 7 — CLUSTER
  ==============================================================================
    Instalación standalone (un solo manager). disabled:yes evita que
    wazuh-analysisd genere warnings periódicos buscando nodos cluster.
  ==============================================================================
  -->
  <cluster>
    <name>wazuh</name>
    <node_name>master-node</node_name>
    <node_type>master</node_type>
    <key>CHANGEME_CLUSTER_KEY_32_CHAR_HEX</key>
    <port>1516</port>
    <bind_addr>0.0.0.0</bind_addr>
    <nodes>
      <node>NODE_IP</node>
    </nodes>
    <hidden>no</hidden>
    <disabled>yes</disabled>
  </cluster>


  <!--
  ==============================================================================
    BLOQUE 8 — INDEXER
  ==============================================================================
    Conexión del manager con OpenSearch Indexer (mismo host).
    Las rutas de certificados son las generadas por el instalador
    oficial de Wazuh v4.x. NO modificar.
  ==============================================================================
  -->
  <indexer>
    <enabled>yes</enabled>
    <hosts>
      <host>https://127.0.0.1:9200</host>
    </hosts>
    <ssl>
      <certificate_authorities>
        <ca>/etc/filebeat/certs/root-ca.pem</ca>
      </certificate_authorities>
      <certificate>/etc/filebeat/certs/wazuh-server.pem</certificate>
      <key>/etc/filebeat/certs/wazuh-server-key.pem</key>
    </ssl>
  </indexer>


  <!--
  ==============================================================================
    BLOQUE 9 — SYSCOLLECTOR
  ==============================================================================
    Recoge inventario del sistema cada hora: SO, hardware, red, paquetes,
    procesos, usuarios, grupos, servicios. El dashboard usa estos datos
    para la pestaña "Inventory" y Vulnerability Detection.
    NO desactivar: sin syscollector el inventario aparece vacío.
  ==============================================================================
  -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="no">yes</ports>
    <processes>yes</processes>
    <users>yes</users>
    <groups>yes</groups>
    <services>yes</services>
    <browser_extensions>yes</browser_extensions>
    <synchronization>
      <max_eps>10</max_eps>
    </synchronization>
  </wodle>


  <!--
  ==============================================================================
    BLOQUE 10 — ROOTCHECK
  ==============================================================================
    Detecta rootkits, troyanos, ficheros sospechosos en /dev y puertos
    inusuales. Las exclusiones de Docker evitan falsos positivos con
    overlays y containerd.
  ==============================================================================
  -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
    <rootkit_files>etc/rootcheck/rootkit_files.txt</rootkit_files>
    <rootkit_trojans>etc/rootcheck/rootkit_trojans.txt</rootkit_trojans>
    <skip_nfs>yes</skip_nfs>
    <ignore>/var/lib/containerd</ignore>
    <ignore>/var/lib/docker/overlay2</ignore>
  </rootcheck>


  <!--
  ==============================================================================
    BLOQUE 11 — SCA (Security Configuration Assessment)
  ==============================================================================
    Evalúa configuración del sistema contra benchmarks CIS/NIST.
    Útil para mostrar compliance en el dashboard.
  ==============================================================================
  -->
  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
    <skip_nfs>yes</skip_nfs>
  </sca>


  <!--
  ==============================================================================
    BLOQUE 12 — VULNERABILITY DETECTION
  ==============================================================================
    Cruza paquetes instalados (syscollector) con bases de datos de CVEs.
    feed-update-interval: actualiza la base de CVEs cada 60 minutos.
  ==============================================================================
  -->
  <vulnerability-detection>
    <enabled>yes</enabled>
    <index-status>yes</index-status>
    <feed-update-interval>60m</feed-update-interval>
  </vulnerability-detection>


  <!--
  ==============================================================================
    BLOQUE 13 — SYSCHECK (FIM)
  ==============================================================================
    File Integrity Monitoring: detecta cambios en binarios y configs críticas.
    alert_new_files: alerta cuando aparece un fichero nuevo.
    auto_ignore:no evita que Wazuh deje de alertar sobre ficheros que
      cambian frecuentemente.
    max_eps:50 limita eventos por segundo para no bloquear el pipeline.
  ==============================================================================
  -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <auto_ignore frequency="10" timeframe="3600">no</auto_ignore>
    <directories>/etc,/usr/bin,/usr/sbin</directories>
    <directories>/bin,/sbin,/boot</directories>
    <ignore>/etc/mtab</ignore>
    <ignore type="sregex">.log$|.swp$</ignore>
    <process_priority>10</process_priority>
    <max_eps>50</max_eps>
    <synchronization>
      <enabled>yes</enabled>
      <interval>5m</interval>
      <max_eps>10</max_eps>
    </synchronization>
  </syscheck>


  <!--
  ==============================================================================
    BLOQUE 14 — LOCALFILES DEL MANAGER
  ==============================================================================
    Logs locales de la VM Wazuh que el manager lee directamente (sin agente).
    Los agentes tienen sus propios localfiles en:
      /var/ossec/etc/shared/<grupo>/agent.conf
  ==============================================================================
  -->

  <!-- Log de respuestas activas — auditoría de bloqueos perimetrales -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/ossec/logs/active-responses.log</location>
  </localfile>

  <!-- Log del script opnsense-block.sh — visibilidad de API calls -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/ossec/logs/opnsense-ar.log</location>
  </localfile>

  <!-- Autenticaciones SSH y sudo del propio manager -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- Syslog general del manager -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>


  <!--
  ==============================================================================
    BLOQUE 15 — ACTIVE RESPONSE
  ==============================================================================
    ARQUITECTURA DE RESPUESTA ZERO TRUST
    =====================================
    Wazuh detecta una alerta → ejecuta opnsense-block.sh en el manager
    → el script llama a la API REST de OPNsense → OPNsense añade la IP
    al alias wazuh_blocklist → pf bloquea el tráfico en el perímetro.

    PRINCIPIO: el bloqueo es perimetral, no local en cada VM.
    Esto significa que una IP bloqueada queda impedida de alcanzar
    CUALQUIER servicio del entorno (T-Pot, clientes, manager), no solo
    la VM donde se originó la detección.

    location:local = el script corre en el MANAGER, que es la única VM
    con acceso de red a la API de OPNsense (LAN2: 172.18.0.0/24).

    COMANDO DECLARADO
    =================
    <name>opnsense-block</name>
    <executable>opnsense-block.sh</executable>
    <timeout_allowed>yes</timeout_allowed>

    BLOQUES ACTIVE RESPONSE ACTIVOS
    ===============================

    AR 1 — Consolidado por grupos (Suricata + brute_force + scan)
    Se dispara cuando cualquier regla de los grupos indicados salta:
      · suricata      → alertas IDS perimetrales (reglas 100100–100122)
      · brute_force   → fuerza bruta SSH/Fail2Ban (reglas 100003, 100030)
      · scan          → escaneos de red (reglas 100001, 100002, 100005)
    timeout:1800 = IP bloqueada 30 minutos. Tras ese tiempo, Wazuh
    envía automáticamente un "delete" al script para desbloquearla.

    AR 2 — Fail2Ban (opcional, comentado)
    Fail2Ban ya está cubierto por AR 1 (grupo brute_force). Este bloque
    adicional permite un timeout diferenciado si se desea en el futuro.
  ==============================================================================
  -->

  <!-- Declaración del comando — OBLIGATORIA antes de los bloques AR -->
  <command>
    <name>opnsense-block</name>
    <executable>opnsense-block.sh</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!-- AR 1: Consolidado Suricata + brute_force + scan -->
  <active-response>
    <command>opnsense-block</command>
    <location>local</location>
    <rules_group>suricata,brute_force,scan</rules_group>
    <timeout>1800</timeout>
  </active-response>

  <!-- AR 2: Fail2Ban adicional (comentado — cubierto por AR 1) -->
  <!--
  <active-response>
    <command>opnsense-block</command>
    <location>local</location>
    <rules_id>100030</rules_id>
    <timeout>600</timeout>
  </active-response>
  -->


  <!-- ================================================================ -->
  <!-- BLOQUE ACTIVE RESPONSE para  Fase 2 (Cowrie) + Fase 4 (F2B)  -->
  <!-- Ejecución remota en OPNsense (agente 009) vía defined-agent      -->
  <!-- ================================================================ -->


<command>
  <name>opnsense-fw</name>
  <executable>opnsense-fw</executable>
  <timeout_allowed>yes</timeout_allowed>
</command>

  <!-- AR 3: Cowrie honeypot → bloqueo perimetral OPNsense -->

  <active-response>
    <disabled>no</disabled>
    <command>opnsense-fw</command>
    <location>defined-agent</location>
    <agent_id>009</agent_id>
    <rules_id>100011</rules_id>
    <timeout>3600</timeout>
  </active-response>

  
  <!-- AR 4: Fail2Ban consolidado (regla 100040) → bloqueo perimetral OPNsense -->
  <active-response>                  
    <disabled>no</disabled>
    <command>opnsense-fw</command>
    <location>defined-agent</location>
    <agent_id>009</agent_id>
    <rules_id>100040</rules_id>
    <timeout>3600</timeout>
  </active-response>

</ossec_config>
